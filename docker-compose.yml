version: "3.7"

services:
  mongodb:
    image: mongo:4.4.0-rc7
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: uberadmin
      MONGO_INITDB_ROOT_PASSWORD: uberadminpass
    volumes: 
      - ./data:/data/db
      - ./db-init-scripts:/docker-entrypoint-initdb.d
    ports:
      - 27017:27017
    networks: 
      - uber-eats

  #########################################################################
  #                               KAFKA                                   #
  #########################################################################
  zookeeper:
    image: confluentinc/cp-zookeeper:6.2.0
    container_name: zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - uber-eats

  kafka:
    image: confluentinc/cp-kafka:6.2.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    networks:
      - uber-eats

  kafka-backend:
    depends_on: 
      - kafka
      - zookeeper
    build:
      context: ./kafka-backend
      dockerfile: Dockerfile
    volumes: 
      - type: bind
        source: ./kafka-backend
        target: /app
      
    restart: unless-stopped
    networks: 
      - uber-eats

  #########################################################################
  #                               SERVICES                                #
  #########################################################################

  ##auth:
  #  depends_on: 
   #   - mongodb
    #  - kafka-backend
    #build:
     # context: ./auth
      #dockerfile: Dockerfile
    #ports:
     # - 7100:3000
    #volumes: 
     # - ./auth:/app
      #- /app/node_modules
      
        
    #restart: unless-stopped
    #networks: 
     # - uber-eats

  restaurant:
    depends_on: 
      - mongodb
      - kafka-backend
    build:
      context: ./restaurant
      dockerfile: Dockerfile
    ports:
      - 7001:3000
    volumes: 
      - ./restaurant:/app
      - /app/node_modules
      
    restart: unless-stopped
    networks: 
      - uber-eats

  customer:
    depends_on: 
      - mongodb
      - kafka-backend
    build:
      context: ./customer
      dockerfile: Dockerfile
    ports:
      - 7002:3000
    volumes: 
      - ./customer:/app
      - /app/node_modules
      
    restart: unless-stopped
    networks: 
      - uber-eats

  order:
    depends_on: 
      - mongodb
      - kafka-backend
    build:
      context: ./order
      dockerfile: Dockerfile
    ports:
      - 7003:3000
    volumes: 
      - ./order:/app
      - /app/node_modules
      
    restart: unless-stopped
    networks: 
      - uber-eats

  graphql:
    depends_on: 
      
      - customer
      - restaurant
      - order
    build:
      context: ./graphql
      dockerfile: Dockerfile
    ports:
      - 3001:3001
    volumes: 
       - ./graphql:/app
       - /app/node_modules
      
    restart: unless-stopped
    networks: 
      - uber-eats

  #web:
   # depends_on: 
    #  - auth
     # - customer
      #- restaurant
      #- order
    #build:
     # context: ./web
      #dockerfile: Dockerfile
    #ports:
     # - 3000:3000
    #volumes: 
     # - ./web:/app
      #- /app/node_modules
      
    #restart: unless-stopped
    #networks: 
    #  - uber-eats

  nginx:
    depends_on: 
      - mongodb
    image: nginx:alpine
    ports:
      - 8000:8000
    volumes: 
      - type: bind
        source: ./nginx/nginx.conf
        target: /etc/nginx/conf.d/default.conf
    restart: unless-stopped
    networks: 
      - uber-eats

networks: 
  uber-eats: